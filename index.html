<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DrieKraaien - Hitster Digital</title>
    <style>
        :root {
            --spotify-green: #1DB954;
            --glass-bg: rgba(255, 255, 255, 0.07);
            --glass-border: rgba(255, 255, 255, 0.12);
            --red: #ff4d4d;
        }

        body, html { margin: 0; padding: 0; height: 100%; background: #050505; color: white; font-family: 'Segoe UI', Roboto, sans-serif; overflow: hidden; }
        #bg-glow { position: fixed; width: 100vw; height: 100vh; background: radial-gradient(circle at 50% 50%, #1db95410 0%, #000 90%); z-index: -1; }

        #app { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; cursor: pointer; }

        /* --- NEW CONTROL BAR --- */
        #top-bar { position: absolute; top: 20px; width: 90%; display: flex; justify-content: space-between; align-items: center; z-index: 100; pointer-events: none; }
        #top-bar * { pointer-events: auto; }
        
        #play-pause-btn { background: var(--glass-bg); border: 1px solid var(--glass-border); color: white; width: 50px; height: 50px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; backdrop-filter: blur(10px); }
        
        #pop-meter { background: var(--glass-bg); border: 1px solid var(--glass-border); padding: 8px 15px; border-radius: 20px; font-weight: 800; font-size: 0.9rem; backdrop-filter: blur(10px); display: none; }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2rem;
            width: 85%;
            max-width: 420px;
            margin: 12px;
            box-shadow: 0 15px 45px rgba(0, 0, 0, 0.6);
            transition: all 0.5s cubic-bezier(0.2, 1, 0.3, 1);
        }

        .hidden { opacity: 0; transform: translateY(20px); height: 0; padding: 0; margin: 0; overflow: hidden; border: none; }
        .visible { opacity: 1; transform: translateY(0); height: auto; }

        h1 { font-size: 2.4rem; margin: 10px 0; font-weight: 800; letter-spacing: -0.5px; line-height: 1.1; }
        h2 { font-size: 0.85rem; text-transform: uppercase; color: var(--spotify-green); letter-spacing: 4px; margin-bottom: 8px; font-weight: 600; }

        #countdown-container { margin-top: 15px; font-weight: bold; color: var(--spotify-green); font-size: 1.2rem; min-height: 24px; }

        #settings { position: absolute; top: 85px; display: flex; gap: 8px; z-index: 90; }
        .timer-btn { background: var(--glass-bg); border: 1px solid var(--glass-border); color: white; padding: 10px 16px; border-radius: 40px; cursor: pointer; font-size: 0.7rem; font-weight: 700; transition: 0.2s; }
        .timer-btn.active { background: var(--spotify-green); border-color: var(--spotify-green); color: black; }

        #status { position: absolute; bottom: 40px; font-size: 0.75rem; opacity: 0.3; text-transform: uppercase; letter-spacing: 3px; font-weight: 600; }
        #login-btn { padding: 22px 55px; background: var(--spotify-green); border: none; border-radius: 60px; color: black; font-size: 1.2rem; font-weight: 900; cursor: pointer; }
    </style>
</head>
<body>

<div id="bg-glow"></div>

<div id="top-bar">
    <button id="play-pause-btn" onclick="togglePlayback()">⏯</button>
    <div id="pop-meter">POP: <span id="pop-val">--</span>%</div>
</div>

<div id="settings">
    <button id="btn-0" class="timer-btn active" onclick="setTimer(0)">Manual</button>
    <button id="btn-5" class="timer-btn" onclick="setTimer(5)">5s</button>
    <button id="btn-15" class="timer-btn" onclick="setTimer(15)">15s</button>
    <button id="btn-30" class="timer-btn" onclick="setTimer(30)">30s</button>
</div>

<div id="app" onclick="handleInteraction(event)">
    <button id="login-btn" onclick="startLoginFlow()">Connect Spotify</button>
    
    <div id="display" style="display:none; width: 100%; flex-direction: column; align-items: center;">
        <div id="artist-card" class="glass-card hidden">
            <h2>Artist</h2>
            <h1 id="artist-text">---</h1>
        </div>
        <div id="title-card" class="glass-card hidden">
            <h2>Song Title</h2>
            <h1 id="title-text">---</h1>
        </div>
        <div id="year-card" class="glass-card hidden">
            <h2>Year</h2>
            <h1 id="year-text">---</h1>
        </div>
        <div id="countdown-container" style="display:none;">
            Reveal in: <span id="countdown-val">0</span>s
        </div>
    </div>
    <div id="status">Ready</div>
</div>

<script>
    const CLIENT_ID = 'YOUR_CLIENT_ID_HERE'; 
    const REDIRECT_URI = 'https://your-github-url-here.github.io/driekraaien/'; 
    const SCOPES = 'user-read-currently-playing user-modify-playback-state user-read-playback-state';

    let step = 0;
    let timerValue = 0; 
    let countdownInterval = null;
    let accessToken = localStorage.getItem('access_token');
    let isPlaying = true;

    function setTimer(seconds) {
        timerValue = seconds;
        document.querySelectorAll('.timer-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-' + seconds).classList.add('active');
        resetUIState();
    }

    function resetUIState() {
        step = 0;
        clearInterval(countdownInterval);
        ['artist-card', 'title-card', 'year-card'].forEach(id => document.getElementById(id).className = 'glass-card hidden');
        document.getElementById('countdown-container').style.display = 'none';
        document.getElementById('pop-meter').style.display = 'none';
    }

    // --- NEW: TOGGLE PLAY/PAUSE ---
    async function togglePlayback() {
        // We fetch current state to decide if we play or pause
        const data = await spotifyFetch('https://api.spotify.com/v1/me/player');
        const method = (data && data.is_playing) ? 'PUT' : 'PUT';
        const action = (data && data.is_playing) ? 'pause' : 'play';
        
        await spotifyFetch(`https://api.spotify.com/v1/me/player/${action}`, 'PUT');
        document.getElementById('play-pause-btn').innerText = action === 'play' ? '⏸' : '▶';
    }

    async function handleInteraction(e) {
        if (e.target.closest('#settings') || e.target.closest('#top-bar') || e.target.id === 'login-btn') return;
        if (!accessToken) return;
        clearInterval(countdownInterval); 
        triggerNextStep();
    }

    async function triggerNextStep() {
        step++;
        if (step > 5) step = 1;
        updateUI();
    }

    async function updateUI() {
        const status = document.getElementById('status');
        
        if (step === 1) {
            resetUIState();
            status.innerText = "Skipping track...";
            await spotifyFetch('https://api.spotify.com/v1/me/player/next', 'POST');
            setTimeout(() => { triggerNextStep(); }, 1500);
        } 
        else if (step === 2) {
            const data = await spotifyFetch('https://api.spotify.com/v1/me/player/currently-playing');
            if (data && data.item) {
                // Set texts
                document.getElementById('artist-text').innerText = data.item.artists[0].name;
                document.getElementById('title-text').innerText = data.item.name;
                document.getElementById('year-text').innerText = data.item.album.release_date.split('-')[0];
                
                // --- POPULARITY METER ---
                const pop = data.item.popularity;
                const meter = document.getElementById('pop-meter');
                const popVal = document.getElementById('pop-val');
                popVal.innerText = pop;
                meter.style.display = 'block';
                
                if (pop <= 30) meter.style.color = '#ff4d4d'; // Red
                else if (pop <= 60) meter.style.color = '#ffffff'; // White
                else meter.style.color = '#1db954'; // Green
                
                startCountdown();
            } else {
                status.innerText = "Spotify inactive!";
                step = 0;
            }
        } 
        else if (step >= 3 && step <= 5) {
            const cards = ['artist-card', 'title-card', 'year-card'];
            document.getElementById(cards[step-3]).className = 'glass-card visible';
            if (step < 5) startCountdown();
            else status.innerText = "Click for next song.";
        }
    }

    function startCountdown() {
        if (timerValue === 0) return;
        let current = timerValue;
        const container = document.getElementById('countdown-container');
        const val = document.getElementById('countdown-val');
        container.style.display = 'block';
        val.innerText = current;

        countdownInterval = setInterval(() => {
            current--;
            val.innerText = current;
            if (current <= 0) {
                clearInterval(countdownInterval);
                triggerNextStep();
            }
        }, 1000);
    }

    // --- AUTH LOGIC (SAME AS BEFORE) ---
    async function spotifyFetch(url, method = 'GET') {
        try {
            const res = await fetch(url, {
                method: method,
                headers: { 'Authorization': `Bearer ${accessToken}` }
            });
            if (res.status === 401) { startLoginFlow(); return null; }
            return (res.status === 200) ? await res.json() : {};
        } catch (e) { return null; }
    }

    async function startLoginFlow() {
        const verifier = generateRandomString(64);
        const challenge = await generateCodeChallenge(verifier);
        localStorage.setItem('code_verifier', verifier);
        const params = new URLSearchParams({
            client_id: CLIENT_ID,
            response_type: 'code',
            redirect_uri: REDIRECT_URI,
            code_challenge_method: 'S256',
            code_challenge: challenge,
            scope: SCOPES
        });
        window.location.href = `https://accounts.spotify.com/authorize?${params.toString()}`;
    }

    function generateRandomString(length) {
        const possible = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
        const values = crypto.getRandomValues(new Uint8Array(length));
        return values.reduce((acc, x) => acc + possible[x % possible.length], "");
    }

    async function generateCodeChallenge(codeVerifier) {
        const data = new TextEncoder().encode(codeVerifier);
        const digest = await crypto.subtle.digest('SHA-256', data);
        return btoa(String.fromCharCode(...new Uint8Array(digest))).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
    }

    window.onload = async () => {
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');
        if (code) {
            const codeVerifier = localStorage.getItem('code_verifier');
            const response = await fetch('https://accounts.spotify.com/api/token', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: new URLSearchParams({ client_id: CLIENT_ID, grant_type: 'authorization_code', code: code, redirect_uri: REDIRECT_URI, code_verifier: codeVerifier })
            });
            const data = await response.json();
            if (data.access_token) {
                accessToken = data.access_token;
                localStorage.setItem('access_token', accessToken);
                window.history.replaceState({}, document.title, window.location.pathname); 
            }
        }
        if (accessToken) {
            document.getElementById('login-btn').style.display = 'none';
            document.getElementById('display').style.display = 'flex';
        }
    };
</script>
</body>
</html>
